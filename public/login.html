<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - SASTA CCTV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📹</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth.js"></script>
</head>

<body>
  <!-- Header & Navigation -->
  <header>
    <div class="nav-container">
      <a class="nav-logo" href="/">
        <div class="logo-icon">
          <span>S</span>
          <div class="logo-dot"></div>
        </div>
        <div class="logo-text">SASTA <span>CCTV</span></div>
      </a>
      <nav class="nav-links" id="nav-links-container">
        <a class="nav-link" href="/">Home</a>
      </nav>
      <div class="nav-actions" id="nav-actions">
        <!-- Will be loaded dynamically, defaults to placeholders -->
        <a class="btn btn-secondary" href="/login.html">Login</a>
        <a class="btn btn-primary" href="/register.html">Sign Up</a>
      </div>
    </div>
  </header>

  <main>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Login to view your cameras and alerts</p>
        </div>
        
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
          </div>

          <div class="form-feedback error" id="feedback-error"></div>
          <div class="form-feedback success" id="feedback-success"></div>
          
          <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 1.5rem; height: 44px;">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/register.html">Create one</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Redirect if already logged in
    redirectIfLoggedIn();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('feedback-error');
      const succEl = document.getElementById('feedback-success');

      errEl.style.display = 'none';
      succEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          succEl.innerText = 'Login successful! Redirecting...';
          succEl.style.display = 'block';
          
          // Get redirect URL from query param if present
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect');
          
          if (redirect) {
            setTimeout(() => {
              window.location.href = redirect;
            }, 1000);
          } else {
            // Determine dynamically
            try {
              const countRes = await fetch('/api/devices/active-cameras');
              const countData = await countRes.json();
              const target = countData.count === 0 ? '/camera.html?autostart=true' : '/monitor.html';
              setTimeout(() => {
                window.location.href = target;
              }, 1000);
            } catch (err) {
              setTimeout(() => {
                window.location.href = '/monitor.html';
              }, 1000);
            }
          }
        } else {
          errEl.innerText = data.error || 'Login failed. Please check credentials.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.innerText = 'Network error, please try again.';
        errEl.style.display = 'block';
        console.error('Login error:', err);
      }
    });
  </script>
</body>
</html>
